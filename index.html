<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Jiwoon Kim &amp; Compositing Supervisor</title>

  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:     #0c0c0c;
      --bg2:    #151515;
      --fg:     #f5f5f7;
      --muted:  #a1a1a6;
      --dim:    #86868b;
      --border: rgba(255,255,255,0.08);
      --blue:   #2997ff;
      --hh:     56px;
      --gap:    6px;
      --pad:    52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                   "Inter", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding-top: var(--hh);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.015em;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--hh);
      background: rgba(12,12,12,0.78);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 300;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .logo-wrap { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--fg);
      text-decoration: none;
    }
    .logo b { font-weight: 700; color: #fff; }

    /* Available badge */
    .avail-badge {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(52,199,89,0.1);
      color: #34c759;
      border: 0.5px solid rgba(52,199,89,0.3);
      animation: badge-pulse 2.8s ease-in-out infinite;
      white-space: nowrap;
    }
    @keyframes badge-pulse {
      0%,100% { opacity:1; }
      50%      { opacity:0.5; }
    }

    nav { display: flex; gap: 4px; }
    nav a {
      display: block;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      border-radius: 5px;
      transition: color .2s, background .2s;
    }
    nav a:hover  { color: var(--fg); }
    nav a.active { color: var(--fg); background: rgba(255,255,255,0.1); }

    /* ─── REVEAL ─── */
    .r {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .9s cubic-bezier(.16,1,.3,1),
                  transform .9s cubic-bezier(.16,1,.3,1);
    }
    .r.vis { opacity:1; transform:none; }

    .rs > * {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .8s cubic-bezier(.16,1,.3,1),
                  transform .8s cubic-bezier(.16,1,.3,1);
    }
    .rs.vis > *:nth-child(1) { opacity:1; transform:none; transition-delay:.00s; }
    .rs.vis > *:nth-child(2) { opacity:1; transform:none; transition-delay:.08s; }
    .rs.vis > *:nth-child(3) { opacity:1; transform:none; transition-delay:.16s; }

    /* ─── COMMON ─── */
    .eyebrow {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
    }

    /* ─── HERO ─── */
    #hero {
      min-height: calc(100vh - var(--hh));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px var(--pad) 80px;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 45%,
                    rgba(41,151,255,0.055) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 28px;
    }
    .hero-hl {
      font-size: clamp(2.8rem, 7.5vw, 6.8rem);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.04em;
      color: var(--fg);
      margin-bottom: 32px;
      max-width: 860px;
    }
    .hero-hl em {
      color: var(--muted);
      font-style: normal;
      font-weight: 300;
    }
    .hero-credits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 52px;
    }
    .hero-pill {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid rgba(255,255,255,0.13);
      color: var(--muted);
    }
    .hero-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      padding: 14px 40px;
      border-radius: 32px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background .2s, transform .2s;
      font-family: inherit;
    }
    .btn-primary:hover { background: #0071e3; transform: scale(1.04); }
    .btn-secondary {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 32px;
      transition: color .2s;
    }
    .btn-secondary:hover { color: var(--fg); }
    .hero-scroll {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--dim);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: scroll-hint 2.2s ease-in-out infinite;
    }
    .hero-scroll::after {
      content: '';
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, var(--dim), transparent);
    }
    @keyframes scroll-hint {
      0%,100% { opacity:0.7; transform:translateX(-50%) translateY(0); }
      50%      { opacity:1;   transform:translateX(-50%) translateY(5px); }
    }

    /* ─── ABOUT ─── */
    #about {
      background: var(--bg2);
      padding: 140px 0 120px;
    }
    .about-wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 var(--pad);
    }
    .about-hl {
      font-size: clamp(2rem, 4vw, 3.6rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -.03em;
      color: var(--fg);
      margin-bottom: 52px;
    }
    .about-hl em { color: var(--muted); font-weight: 400; }
    .about-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      margin-bottom: 80px;
      align-items: center;
    }
    .about-p {
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .about-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #1e1e1e;
      border-radius: 8px;
      overflow: hidden;
    }
    .about-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .about-credits { border-top: 0.5px solid var(--border); padding-top: 40px; }
    .credits-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 28px;
    }
    .credits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      row-gap: 16px;
      column-gap: 24px;
    }
    .credit { display: flex; align-items: baseline; gap: 10px; }
    .credit-film { font-size: 0.9rem; font-weight: 500; color: var(--fg); }
    .credit-role { font-size: 0.8rem; color: var(--muted); }

    /* ─── WORK ─── */
    #work {
      padding: 100px 0 40px;
      border-top: 0.5px solid var(--border);
    }
    .work-hdr {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 var(--gap) 16px;
      max-width: 1800px;
      margin: 0 auto;
    }
    .work-count {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--muted);
      transition: color .2s;
    }

    /* ─── FILTER BAR ─── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 var(--gap) 24px;
      max-width: 1800px;
      margin: 0 auto;
    }
    .filter-btn {
      appearance: none;
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.14);
      color: var(--muted);
      padding: 7px 18px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: color .2s, background .2s, border-color .2s;
    }
    .filter-btn:hover  { color: var(--fg); border-color: rgba(255,255,255,0.28); }
    .filter-btn.active {
      background: rgba(255,255,255,0.09);
      color: var(--fg);
      border-color: rgba(255,255,255,0.28);
    }

    /* ─── GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: var(--gap);
      padding: 0 var(--gap) var(--gap);
      max-width: 1800px;
      margin: 0 auto;
    }

    /* ─── CARD ─── */
    .card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: #111;
      border-radius: 4px;
    }
    /* Skeleton loading */
    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 9 / 13;
      object-fit: cover;
      background: #1a1a1a;
      opacity: 0;
      transition: transform .72s cubic-bezier(.22,1,.36,1),
                  opacity .45s ease;
    }
    .card img.loaded { opacity: 1; }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
        rgba(0,0,0,.9) 0%, rgba(0,0,0,.3) 40%, transparent 100%);
      opacity: 0;
      transition: opacity .4s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px 8px;
      gap: 4px;
    }
    .card-studio, .card-meta {
      transform: translateY(12px);
      transition: transform .4s cubic-bezier(.25,1,.5,1);
    }
    .card-studio {
      font-size: 0.45rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .card-title {
      font-size: 0.6rem;
      font-weight: 500;
      color: rgba(255,255,255,.95);
      line-height: 1.2;
    }
    .play-ring {
      width: 20px; height: 20px;
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }
    .play-ring svg { width:6px; height:6px; fill:rgba(255,255,255,.92); margin-left:1px; }

    .card:hover img           { transform: scale(1.08); }
    .card:hover .card-overlay { opacity: 1; }
    .card:hover .card-studio,
    .card:hover .card-meta    { transform: translateY(0); }
    .card:hover .play-ring    { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.8); }
    .card:focus-visible       { outline: 2px solid var(--blue); outline-offset: 2px; z-index:1; }

    /* Active card when lightbox is open */
    .card.lb-active { outline: 2px solid var(--blue); outline-offset: 2px; z-index:1; }
    .card.lb-active .card-overlay { opacity: 1; }
    .card.lb-active .card-studio,
    .card.lb-active .card-meta   { transform: translateY(0); }

    /* Filtered-out card */
    .card.hidden { display: none; }

    /* ─── CONTACT ─── */
    #contact {
      background: var(--bg);
      border-top: 0.5px solid var(--border);
      padding: 100px 0 120px;
    }
    .contact-wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 var(--pad);
    }
    .contact-hl {
      font-size: clamp(2.5rem, 6vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.04em;
      margin-bottom: 72px;
    }
    .contact-tiles {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .ctile {
      border-right: 0.5px solid var(--border);
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255,255,255,0.02);
      transition: background 0.3s;
    }
    .ctile:hover { background: rgba(255,255,255,0.04); }
    .ctile:last-child { border-right: none; }
    .ctile-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .ctile-val {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--fg);
      text-decoration: none;
      transition: color .2s;
    }
    a.ctile-val:hover { color: #fff; }
    span.ctile-val.obfuscated { cursor: default; user-select: text; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 0.5px solid var(--border);
      padding: 32px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .foot { font-size: 0.75rem; color: var(--dim); text-decoration: none; transition: color .2s; }
    a.foot:hover { color: var(--fg); }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.86);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity .3s ease;
      padding: 20px;
    }
    .lightbox.open { opacity: 1; }

    .lb-surface {
      width: 100%;
      max-width: 1200px;
      max-height: 90vh;
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      overflow-y: auto;
    }

    /* LB header row */
    .lb-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }
    .lb-name {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--fg);
      margin: 0;
      flex: 1;
      line-height: 1.3;
    }
    .lb-pills {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .lb-pill {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 10px;
      border: 0.5px solid rgba(255,255,255,0.13);
      color: var(--dim);
    }
    .lb-pill.cat {
      border-color: rgba(41,151,255,0.28);
      color: var(--blue);
      background: rgba(41,151,255,0.07);
    }

    .lb-body {
      display: flex;
      gap: 30px;
      align-items: flex-start;
      margin-bottom: 30px;
    }
    .lb-video-container {
      flex: 2;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .lb-video-container iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      display: block;
    }

    /* LB description panel */
    .lb-desc {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .lb-desc h3 {
      color: var(--fg);
      font-size: 1rem;
      font-weight: 500;
      margin: 0;
    }
    .lb-desc-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .lb-desc-row {
      display: flex;
      gap: 6px;
      font-size: 0.72rem;
    }
    .lb-desc-label {
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--dim);
      min-width: 48px;
    }
    .lb-desc-val { color: var(--muted); }
    .lb-desc-body {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--muted);
      border-top: 0.5px solid rgba(255,255,255,0.06);
      padding-top: 12px;
    }

    /* LB bottom bar */
    .lb-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 24px;
      margin-top: auto;
    }
    .lb-nav { display: flex; gap: 10px; align-items: center; }
    .lb-nav-btn {
      appearance: none;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--fg);
      padding: 10px 20px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .lb-nav-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.45); }
    .lb-counter {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--dim);
      letter-spacing: 0.06em;
      min-width: 44px;
      text-align: center;
    }
    .lb-close-area { display: flex; align-items: center; gap: 20px
