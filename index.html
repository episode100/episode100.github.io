<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Jay Han — VFX Compositor</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg:     #0c0c0c; 
      --bg2:    #151515;
      --fg:     #f5f5f7; 
      --muted:  #a1a1a6; 
      --dim:    #86868b; 
      --border: rgba(255,255,255,0.08);
      --hh:     56px;
      --gap:    6px; /* 10개가 한 줄에 들어가므로 간격을 조금 더 줄였습니다 */
      --pad:    52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding-top: var(--hh);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.015em; 
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--hh);
      background: rgba(12,12,12,0.75);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 300;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); 
    }
    .logo {
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--fg);
      text-decoration: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8); 
    }
    .logo b { font-weight: 700; color: #fff; }
    nav { display: flex; gap: 4px; }
    nav a {
      display: block;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      border-radius: 5px;
      transition: color .2s, background .2s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    nav a:hover  { color: var(--fg); }
    nav a.active { color: var(--fg); background: rgba(255,255,255,0.1); }

    /* ─── REVEAL ANIMATIONS ─── */
    .r {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1);
    }
    .r.vis { opacity: 1; transform: none; }

    .rs > * {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);
    }
    .rs.vis > *:nth-child(1) { opacity:1; transform:none; transition-delay:.00s; }
